<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zepto Clone | Groceries in 10 Mins</title>
    <link rel="stylesheet" href="clone.css">
</head>
<body>

    <header class="navbar">
        <div class="logo">zepto</div>
        <div class="search-bar">
            <input type="text" placeholder="Search for products (e.g. milk, eggs, bread)">
        </div>
        <div class="nav-links">
            <button class="login-btn">Login</button>
            <div class="cart">🛒 Cart</div>
        </div>
    </header>

    <section class="hero-banner">
        <div class="offer-card">
            <h2>50% OFF</h2>
            <p>On your first 3 orders</p>
            <button class="order-now">Order Now</button>
        </div>
    </section>

    <main class="container">
        <h3>Shop by Category</h3>
        <div class="product-grid">
            <div class="product-card">
                <div class="discount-tag">15% OFF</div>
                <img src="https://via.placeholder.com/150?text=Milk" alt="Milk">
                <h4>Fresh Milk</h4>
                <p>500 ml</p>
                <div class="price-row">
                    <span>₹28</span>
                    <button class="add-btn">ADD</button>
                </div>
            </div>

            <div class="product-card">
                <div class="discount-tag">10% OFF</div>
                <img src="https://via.placeholder.com/150?text=Bread" alt="Bread">
                <h4>Brown Bread</h4>
                <p>400 g</p>
                <div class="price-row">
                    <span>₹45</span>
                    <button class="add-btn">ADD</button>
                </div>
            </div>

            <div class="product-card">
                <div class="discount-tag">20% OFF</div>
                <img src="https://via.placeholder.com/150?text=Fruits" alt="Fruits">
                <h4>Banana</h4>
                <p>6 pcs</p>
                <div class="price-row">
                    <span>₹35</span>
                    <button class="add-btn">ADD</button>
                </div>
            </div>

            <div class="product-card">
                <div class="discount-tag">5% OFF</div>
                <img src="https://via.placeholder.com/150?text=Eggs" alt="Eggs">
                <h4>Farm Eggs</h4>
                <p>6 pcs</p>
                <div class="price-row">
                    <span>₹52</span>
                    <button class="add-btn">ADD</button>
                </div>
            </div>
        </div>
    </main>

</body>
</html>
